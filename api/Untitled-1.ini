引入 **FingerprintJS** 是目前不依赖谷歌账号实现设备识别的“工业级”方案。它的原理是通过收集浏览器上百个细微特征（如显卡渲染模式、字体列表、时区、屏幕高刷新率等）计算出一个哈希值。

以下是针对 Chrome 扩展（Manifest V3）的完整解决方案，重点解决**“卸载重装后找回激活状态”**的问题。

---

### **1. 解决方案核心逻辑**

在 Manifest V3 中，由于禁止加载远程代码，你必须将 FingerprintJS 的库文件**本地化**打包到插件中。

#### **实现思路：三级找回机制**

1. **一级（缓存）：** 检查 `chrome.storage.local`。
2. **二级（指纹）：** 如果本地被清空，运行 `FingerprintJS` 重新生成。因为硬件和浏览器特征没变，生成的 `visitorId` 会与卸载前高度一致。
3. **三级（服务器）：** 将 `visitorId` 传给后端，后端查询该 ID 绑定的激活码，返回给插件自动激活。

---

### **2. 完整实现步骤**

#### **第一步：下载并引入库文件**

访问 [FingerprintJS GitHub](https://github.com/fingerprintjs/fingerprintjs/releases) 下载 `fp.min.js`，放在扩展根目录的 `libs/` 文件夹下。

#### **第二步：配置 `manifest.json**`

需要声明 `storage` 权限。

```json
{
  "manifest_version": 3,
  "name": "Device ID Activator",
  "version": "1.0",
  "permissions": ["storage"],
  "background": {
    "service_worker": "background.js"
  },
  "content_scripts": [
    {
      "matches": ["<all_urls>"],
      "js": ["libs/fp.min.js", "content.js"]
    }
  ]
}

```

#### **第三步：编写识别逻辑 (background.js 或 content.js)**

由于 FingerprintJS 需要访问 DOM 元素（如 Canvas）来计算指纹，建议在 **Content Script** 或 **Popup** 中运行：

```javascript
// 获取或生成设备唯一 ID
async function getPersistentId() {
  // 1. 先看本地存没存
  const localData = await chrome.storage.local.get("device_id");
  if (localData.device_id) return localData.device_id;

  // 2. 如果没存（说明是新安装），利用指纹生成
  const fp = await FingerprintJS.load();
  const result = await fp.get();
  const visitorId = result.visitorId; // 这就是该设备的“准硬件ID”

  // 3. 存入本地供下次直接使用
  await chrome.storage.local.set({ "device_id": visitorId });
  return visitorId;
}

// 自动激活逻辑
async function autoActivate() {
  const deviceId = await getPersistentId();
  
  // 4. 请求你的后端接口
  const response = await fetch(`https://api.yourserver.com/check-license?device_id=${deviceId}`);
  const data = await response.json();

  if (data.activated) {
    console.log("欢迎回来！已自动找回激活状态，激活码为:", data.license_key);
    // 执行激活成功后的操作...
  }
}

autoActivate();

```

---

### **3. 关于“兼容性”与“稳定性”的真相**

虽然 FingerprintJS 是目前最强的方案，但你必须了解其局限性：

| 场景 | 识别情况 | 说明 |
| --- | --- | --- |
| **正常卸载重装** | **极高 (90%+)** | 只要不升级系统或大版本更新浏览器，ID 保持不变。 |
| **隐身模式** | **一致** | FingerprintJS 在隐身模式下生成的 ID 通常与正常模式一致。 |
| **清除浏览器缓存** | **一致** | 指纹基于硬件/软件特征，不受清除 Cookie 或缓存影响。 |
| **浏览器大版本更新** | **可能变化** | Chrome 升级（如从 v120 升到 v140）可能改变某些渲染特性，导致 ID 变化。 |
| **更换电脑/重装系统** | **失效** | 硬件环境变了，无法识别，需引导用户通过邮箱/人工找回。 |

---

### **4. 建议：如何让方案更稳？**

为了确保万无一失，建议后端激活接口采用 **“多重绑定”**：

* **主键：** FingerprintJS 生成的 `visitorId`。
* **辅助验证：** 收集 `navigator.platform` (操作系统)、`screen.resolution` (分辨率)。
* **策略：** 当用户重装插件时，后端发现 `visitorId` 匹配成功，且操作系统和分辨率也一致，就直接判定为同一台设备，静默发放激活令牌。

