<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>今天不加班 - 插件激活管理系统</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #10b981; /* 护眼绿 */
            --primary-glow: rgba(16, 185, 129, 0.3);
            --secondary: #3b82f6; /* 科技蓝 */
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --muted: #94a3b8;
            --danger: #ef4444;
            --glass: rgba(30, 41, 59, 0.7);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Inter', -apple-system, system-ui, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            min-height: 100vh;
            background-image: radial-gradient(circle at top right, rgba(16, 185, 129, 0.1), transparent),
                              radial-gradient(circle at bottom left, rgba(59, 130, 246, 0.1), transparent);
        }

        /* 登录页 */
        #loginSection {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
        }

        .login-card {
            background: var(--glass);
            backdrop-filter: blur(12px);
            padding: 40px;
            border-radius: 24px;
            width: 100%;
            max-width: 400px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .logo-icon {
            font-size: 48px;
            color: var(--primary);
            margin-bottom: 20px;
            filter: drop-shadow(0 0 10px var(--primary-glow));
        }

        .login-card h1 { font-size: 24px; margin-bottom: 8px; background: linear-gradient(to right, #10b981, #3b82f6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .login-card p { color: var(--muted); margin-bottom: 30px; font-size: 14px; }

        .input-group { position: relative; margin-bottom: 20px; }
        .input-group i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--muted); }
        .input-group input { 
            width: 100%; padding: 14px 14px 14px 45px; 
            background: rgba(15, 23, 42, 0.6); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 12px; color: white; outline: none; transition: all 0.3s;
        }
        .input-group input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px var(--primary-glow); }

        .btn-primary { 
            width: 100%; padding: 14px; border-radius: 12px; border: none; 
            background: linear-gradient(135deg, var(--primary), var(--secondary)); 
            color: white; font-weight: 600; cursor: pointer; transition: transform 0.2s, opacity 0.2s;
        }
        .btn-primary:hover { transform: translateY(-2px); opacity: 0.9; }

        /* 主界面 */
        #adminSection { display: none; max-width: 1200px; margin: 0 auto; padding: 40px 20px; }

        .navbar { 
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px;
            background: var(--glass); backdrop-filter: blur(12px); padding: 15px 30px; border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .nav-logo { display: flex; align-items: center; gap: 12px; font-weight: 700; font-size: 20px; }
        .nav-logo i { color: var(--primary); }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { 
            background: var(--glass); padding: 20px; border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex; align-items: center; gap: 15px;
        }
        .stat-icon { width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .stat-info h3 { font-size: 14px; color: var(--muted); margin-bottom: 4px; }
        .stat-info p { font-size: 24px; font-weight: 700; }

        .main-grid { display: grid; grid-template-columns: 350px 1fr; gap: 30px; }

        .panel { 
            background: var(--glass); padding: 25px; border-radius: 24px; 
            border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(12px);
        }
        .panel h2 { font-size: 18px; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        .panel h2 i { color: var(--primary); }
        .panel-header { cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .panel-content { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); overflow: hidden; max-height: 500px; opacity: 1; }
        .panel.collapsed .panel-content { max-height: 0; margin: 0; opacity: 0; transform: translateY(-10px); }
        .collapse-icon { transition: transform 0.3s; color: var(--muted); }
        .collapsed .collapse-icon { transform: rotate(-180deg); }

        .form-label { display: block; margin-bottom: 8px; font-size: 13px; color: var(--muted); font-weight: 500; }
        
        .duration-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 15px; }
        .duration-item { 
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 10px; border-radius: 12px; text-align: center; cursor: pointer; transition: all 0.2s;
            font-size: 13px;
        }
        .duration-item:hover { background: rgba(255, 255, 255, 0.1); }
        .duration-item.active { background: var(--primary-glow); border-color: var(--primary); color: var(--primary); }

        .input-control { 
            width: 100%; padding: 12px; background: rgba(15, 23, 42, 0.6); 
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; color: white; margin-bottom: 15px;
        }

        /* 表格样式 */
        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: separate; border-spacing: 0 8px; }
        th { text-align: left; padding: 15px; color: var(--muted); font-weight: 500; font-size: 13px; }
        td { padding: 15px; background: rgba(255, 255, 255, 0.03); border-top: 1px solid rgba(255, 255, 255, 0.05); border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        td:first-child { border-left: 1px solid rgba(255, 255, 255, 0.05); border-radius: 12px 0 0 12px; }
        td:last-child { border-right: 1px solid rgba(255, 255, 255, 0.05); border-radius: 0 12px 12px 0; }

        .key-code { 
            font-family: 'JetBrains Mono', monospace; background: rgba(16, 185, 129, 0.1); 
            color: var(--primary); padding: 4px 8px; border-radius: 6px; font-size: 13px;
        }
        
        .badge { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; text-transform: uppercase; }
        .badge-unused { background: rgba(16, 185, 129, 0.15); color: #10b981; }
        .badge-used { background: rgba(59, 130, 246, 0.15); color: #3b82f6; }
        .badge-expired { background: rgba(239, 68, 68, 0.15); color: #ef4444; }

        .action-btn { 
            padding: 8px; border-radius: 8px; border: none; cursor: pointer; transition: all 0.2s; background: transparent; color: var(--muted);
        }
        .action-btn:hover { background: rgba(255, 255, 255, 0.1); color: white; }
        .action-btn.delete:hover { color: var(--danger); background: rgba(239, 68, 68, 0.1); }

        .logout-btn { 
            background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.2);
            padding: 8px 16px; border-radius: 10px; font-weight: 600; cursor: pointer; transition: all 0.2s;
        }
        .logout-btn:hover { background: var(--danger); color: white; }

        /* 滚动条 */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }

        /* 移动端适配 */
        @media (max-width: 1024px) {
            .main-grid { grid-template-columns: 1fr; }
            #adminSection { padding: 20px 15px; }
        }

        @media (max-width: 768px) {
            .navbar { padding: 12px 15px; border-radius: 15px; margin-bottom: 25px; }
            .nav-logo { font-size: 16px; }
            .logout-btn { padding: 6px 12px; font-size: 13px; }
            
            /* 手机端 3 个卡片排成一行 */
            .stats-grid { 
                grid-template-columns: repeat(3, 1fr); 
                gap: 8px; 
                margin-bottom: 20px;
            }
            .stat-card { 
                padding: 10px 5px; 
                flex-direction: column; 
                text-align: center;
                gap: 5px;
            }
            .stat-icon { width: 32px; height: 32px; font-size: 14px; }
            .stat-info h3 { font-size: 10px; white-space: nowrap; }
            .stat-info p { font-size: 16px; }
            
            .panel { padding: 15px; border-radius: 18px; }
            .panel h2 { font-size: 15px; margin-bottom: 15px; }
            
            .duration-grid { grid-template-columns: repeat(3, 1fr); gap: 6px; }
            .duration-item { padding: 8px 4px; font-size: 11px; }
            
            .login-card { padding: 30px 20px; width: 90%; }
            .login-card h1 { font-size: 20px; }
            
            th, td { padding: 12px 10px; font-size: 12px; }
            .key-code { font-size: 12px; max-width: 120px; overflow: hidden; text-overflow: ellipsis; display: inline-block; vertical-align: middle; }
            .action-btn { padding: 6px; }
            
            /* 表格容器允许左右滑动 */
            .table-container { 
                margin: 0 -10px; 
                padding: 0 10px;
                -webkit-overflow-scrolling: touch;
            }
        }

        @media (max-width: 480px) {
            .duration-grid { grid-template-columns: repeat(2, 1fr); }
            .nav-logo span { display: none; } /* 隐藏 Admin 文字节省空间 */
        }
    </style>
</head>
<body>
    <!-- 登录模块 -->
    <div id="loginSection">
        <div class="login-card">
            <div class="logo-icon"><i class="fas fa-clock-rotate-left"></i></div>
            <h1>今天不加班</h1>
            <p>插件激活管理系统 v2.0</p>
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="adminPassword" placeholder="输入管理密钥进入系统">
            </div>
            <button class="btn-primary" onclick="handleLogin()">授权登录</button>
        </div>
    </div>

    <!-- 主管理界面 -->
    <div id="adminSection">
        <nav class="navbar">
            <div class="nav-logo">
                <i class="fas fa-mug-hot"></i>
                今天不加班 <span style="font-weight: 300; opacity: 0.5; margin-left: 5px;">Admin</span>
            </div>
            <button class="logout-btn" onclick="handleLogout()">
                <i class="fas fa-sign-out-alt"></i> 退出系统
            </button>
        </nav>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon" style="background: var(--primary-glow); color: var(--primary);">
                    <i class="fas fa-key"></i>
                </div>
                <div class="stat-info">
                    <h3>激活码总数</h3>
                    <p id="totalKeys">-</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="background: rgba(59, 130, 246, 0.2); color: var(--secondary);">
                    <i class="fas fa-user-check"></i>
                </div>
                <div class="stat-info">
                    <h3>已激活用户</h3>
                    <p id="usedKeys">-</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="background: rgba(245, 158, 11, 0.2); color: #f59e0b;">
                    <i class="fas fa-hourglass-half"></i>
                </div>
                <div class="stat-info">
                    <h3>待使用额度</h3>
                    <p id="unusedKeys">-</p>
                </div>
            </div>
        </div>

        <div class="main-grid">
            <!-- 左侧：生成面板 -->
            <div class="panel" id="generatePanel">
                <div class="panel-header" onclick="togglePanel('generatePanel')">
                    <h2><i class="fas fa-plus-circle"></i> 快捷生成</h2>
                    <i class="fas fa-chevron-down collapse-icon"></i>
                </div>
                
                <div class="panel-content">
                    <label class="form-label">选择会员周期</label>
                    <div class="duration-grid">
                        <div class="duration-item" data-days="7">周卡</div>
                        <div class="duration-item active" data-days="30">月卡</div>
                        <div class="duration-item" data-days="90">季卡</div>
                        <div class="duration-item" data-days="365">年卡</div>
                        <div class="duration-item" data-days="9999">永久</div>
                        <div class="duration-item" id="customBtn">自定义</div>
                    </div>
                    <input type="number" id="durationInput" class="input-control" placeholder="天数" style="display: none;">

                    <div style="display: flex; gap: 15px;">
                        <div style="flex: 1;">
                            <label class="form-label">批量数量</label>
                            <input type="number" id="batchCount" class="input-control" value="1" min="1" max="50">
                        </div>
                        <div style="flex: 1;">
                            <label class="form-label">识别前缀</label>
                            <input type="text" id="keyPrefix" class="input-control" value="XHS" placeholder="PRO">
                        </div>
                    </div>

                    <button class="btn-primary" style="margin-top: 10px;" onclick="generateKeys()">
                        <i class="fas fa-bolt"></i> 立即一键生成
                    </button>
                </div>
            </div>

            <!-- 右侧：数据列表 -->
            <div class="panel">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <h2><i class="fas fa-list-ul"></i> 激活码库</h2>
                    <button class="action-btn" onclick="fetchKeys()"><i class="fas fa-sync-alt"></i> 刷新</button>
                </div>
                
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>激活密钥</th>
                                <th>有效期</th>
                                <th>当前状态</th>
                                <th>过期时间</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="keyList">
                            <!-- 动态加载 -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = '/api/activation';
        let currentAuth = localStorage.getItem('admin_token');
        let selectedDuration = 30;

        // 初始化时长交互
        document.querySelectorAll('.duration-item').forEach(item => {
            item.onclick = () => {
                if (item.id === 'customBtn') {
                    document.getElementById('durationInput').style.display = 'block';
                } else {
                    document.getElementById('durationInput').style.display = 'none';
                    selectedDuration = parseInt(item.dataset.days);
                }
                document.querySelectorAll('.duration-item').forEach(i => i.classList.remove('active'));
                item.classList.add('active');
            };
        });

        async function handleLogin() {
            const password = document.getElementById('adminPassword').value;
            if(!password) return;
            
            try {
                const res = await fetch(`${API_URL}?action=login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });
                
                const data = await res.json();
                if (data.success) {
                    localStorage.setItem('admin_token', password);
                    currentAuth = password;
                    showAdmin();
                    fetchKeys();
                } else {
                    alert('授权验证失败，请检查密钥');
                }
            } catch (err) {
                alert('无法连接后端服务，请确保端口 3000 已启动');
            }
        }

        function handleLogout() {
            localStorage.removeItem('admin_token');
            location.reload();
        }

        function showAdmin() {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('adminSection').style.display = 'block';
            
            // 手机端默认折叠生成面板
            if (window.innerWidth <= 768) {
                document.getElementById('generatePanel').classList.add('collapsed');
            }
        }

        function togglePanel(id) {
            const panel = document.getElementById(id);
            panel.classList.toggle('collapsed');
        }

        async function fetchKeys() {
            try {
                const res = await fetch(`${API_URL}?action=list`, {
                    headers: { 'x-admin-auth': currentAuth }
                });
                if (res.status === 403) return handleLogout();
                
                const data = await res.json();
                renderKeys(data);
                updateStats(data);
            } catch (err) {
                console.error('Fetch failed', err);
            }
        }

        function renderKeys(data) {
            const list = document.getElementById('keyList');
            list.innerHTML = data.map(item => {
                const isExpired = item.expires_at && new Date(item.expires_at) < new Date();
                let statusClass = item.is_used ? 'badge-used' : 'badge-unused';
                let statusText = item.is_used ? '已激活' : '未使用';
                
                if (isExpired && item.is_used) {
                    statusClass = 'badge-expired';
                    statusText = '已过期';
                }

                return `
                    <tr>
                        <td>
                            <span class="key-code">${item.key}</span>
                            <button class="action-btn" title="复制" onclick="copyText('${item.key}')">
                                <i class="far fa-copy"></i>
                            </button>
                        </td>
                        <td>${item.duration_days >= 9999 ? '永久' : item.duration_days + '天'}</td>
                        <td><span class="badge ${statusClass}">${statusText}</span></td>
                        <td style="color: var(--muted); font-size: 12px;">
                            ${item.expires_at ? new Date(item.expires_at).toLocaleDateString() : '-'}
                        </td>
                        <td>
                            <button class="action-btn delete" title="删除" onclick="deleteKey('${item.id}')">
                                <i class="far fa-trash-can"></i>
                            </button>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function updateStats(data) {
            document.getElementById('totalKeys').innerText = data.length;
            document.getElementById('usedKeys').innerText = data.filter(i => i.is_used).length;
            document.getElementById('unusedKeys').innerText = data.filter(i => !i.is_used).length;
        }

        async function generateKeys() {
            const count = parseInt(document.getElementById('batchCount').value);
            const prefix = document.getElementById('keyPrefix').value;
            let duration = selectedDuration;
            
            if (document.getElementById('customBtn').classList.contains('active')) {
                duration = parseInt(document.getElementById('durationInput').value);
            }

            if (!duration || isNaN(duration)) return alert('请输入有效时长');

            const res = await fetch(`${API_URL}?action=create`, {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'x-admin-auth': currentAuth
                },
                body: JSON.stringify({ count, duration_days: duration, prefix })
            });

            if (res.ok) {
                fetchKeys();
                alert(`🚀 成功生成 ${count} 个激活码！`);
            }
        }

        async function deleteKey(id) {
            if (!confirm('确定彻底销毁此密钥记录吗？')) return;
            const res = await fetch(`${API_URL}?action=delete&id=${id}`, { 
                method: 'DELETE',
                headers: { 'x-admin-auth': currentAuth }
            });
            if (res.ok) fetchKeys();
        }

        function copyText(text) {
            navigator.clipboard.writeText(text);
            // 简单反馈
            const btn = event.currentTarget;
            const icon = btn.querySelector('i');
            icon.className = 'fas fa-check';
            icon.style.color = 'var(--primary)';
            setTimeout(() => {
                icon.className = 'far fa-copy';
                icon.style.color = '';
            }, 1000);
        }

        // 自动登录
        if (currentAuth) {
            showAdmin();
            fetchKeys();
        }
    </script>
</body>
</html>
